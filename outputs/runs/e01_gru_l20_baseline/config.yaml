run:
  name: "e01_gru_l20_baseline"
  output_dir: "outputs/runs/e01_gru_l20_baseline"
  seed: 42

data:
  npz_path: "data/mart/datasets/dataset_sequence_l20_advanced_sequence_fixed_chinext_2016_2026_v1_v20260526.npz"
  train_split: "train"
  validation_split: "validation"
  num_workers: 0
  pin_memory: true

model:
  name: "gru_baseline"
  num_features: 62
  lookback: 20
  d_model: 64
  input_dropout: 0.1
  rnn_hidden_dim: 128
  rnn_num_layers: 2
  rnn_dropout: 0.2
  pooling: "last_hidden"
  head_hidden_dim: 64
  head_dropout: 0.3

training:
  device: "auto"
  batch_size: 256
  max_epochs: 80
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 0.0001
  loss_fn: "huber"
  huber_delta: 1.0
  max_grad_norm: 1.0
  scheduler: "cosine"
  early_stop_metric: "rank_ic_mean"
  early_stop_patience: 10
  min_daily_count: 20
