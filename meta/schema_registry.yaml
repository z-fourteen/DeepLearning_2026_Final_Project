raw:
  basic:
    required_columns: [ts_code, symbol, name, market, list_date]
    columns:
      ts_code: string
      symbol: string
      name: string
      area: string
      industry: string
      cnspell: string
      market: string
      list_date: date_yyyymmdd
      act_name: string
      act_ent_type: string
  trade_cal:
    required_columns: [exchange, cal_date, is_open, pretrade_date]
    columns:
      exchange: string
      cal_date: date_yyyymmdd
      is_open: integer
      pretrade_date: date_yyyymmdd
  daily:
    required_columns: [ts_code, trade_date, open, high, low, close, pre_close, vol, amount]
    columns:
      ts_code: string
      trade_date: date_yyyymmdd
      open: numeric
      high: numeric
      low: numeric
      close: numeric
      pre_close: numeric
      change: numeric
      pct_chg: numeric
      vol: numeric
      amount: numeric
      vwap: numeric
  stock_st:
    required_columns: [ts_code, trade_date, type]
    columns:
      ts_code: string
      name: string
      trade_date: date_yyyymmdd
      type: string
      type_name: string
  index_weight:
    required_columns: [index_code, con_code, trade_date, weight]
    columns:
      index_code: string
      con_code: string
      trade_date: date_yyyymmdd
      weight: numeric
  metric:
    required_columns: [ts_code, trade_date, close, total_mv, circ_mv]
    columns:
      ts_code: string
      trade_date: date_yyyymmdd
      close: numeric
      turnover_rate: numeric
      turnover_rate_f: numeric
      volume_ratio: numeric
      pe: numeric
      pe_ttm: numeric
      pb: numeric
      ps: numeric
      ps_ttm: numeric
      dv_ratio: numeric
      dv_ttm: numeric
      total_share: numeric
      float_share: numeric
      free_share: numeric
      total_mv: numeric
      circ_mv: numeric
  moneyflow:
    required_columns: [ts_code, trade_date, net_mf_vol, net_mf_amount]
    columns:
      ts_code: string
      trade_date: date_yyyymmdd
      buy_sm_vol: numeric
      buy_sm_amount: numeric
      sell_sm_vol: numeric
      sell_sm_amount: numeric
      buy_md_vol: numeric
      buy_md_amount: numeric
      sell_md_vol: numeric
      sell_md_amount: numeric
      buy_lg_vol: numeric
      buy_lg_amount: numeric
      sell_lg_vol: numeric
      sell_lg_amount: numeric
      buy_elg_vol: numeric
      buy_elg_amount: numeric
      sell_elg_vol: numeric
      sell_elg_amount: numeric
      net_mf_vol: numeric
      net_mf_amount: numeric
  market:
    required_columns: [ts_code, trade_date, close, open, high, low, pre_close]
    columns:
      ts_code: string
      trade_date: date_yyyymmdd
      close: numeric
      open: numeric
      high: numeric
      low: numeric
      pre_close: numeric
      change: numeric
      pct_chg: numeric
      vol: numeric
      amount: numeric

state:
  security_daily_state:
    columns:
      trade_date: date_yyyymmdd
      ts_code: string
      is_st: boolean
      is_suspended: boolean
      is_limit_up: boolean
      is_limit_down: boolean
      is_tradable: boolean
      listed_days: integer
      listed_trading_days: integer
      market_board: string
      has_price_limit: boolean
      limit_ratio: numeric
      limit_up_price: numeric
      limit_down_price: numeric
      limit_rule_id: string
      limit_rule_reason: string
      volume_valid: boolean
      price_valid: boolean
      state_version: string
      created_at: timestamp

core:
