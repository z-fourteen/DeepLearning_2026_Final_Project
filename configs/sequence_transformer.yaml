run:
  name: "transformer_l20_cls_sinusoidal_e03"
  output_dir: "outputs/runs/transformer_l20_cls_sinusoidal_e03"
  seed: 42

data:
  npz_path: "data/mart/datasets/dataset_sequence_l20_advanced_sequence_fixed_chinext_2016_2026_v1_v20260526.npz"
  train_split: "train"
  validation_split: "validation"
  test_split: "test"
  num_workers: 0
  pin_memory: true

model:
  name: "transformer_encoder"
  num_features: 62
  lookback: 20
  d_model: 64
  input_dropout: 0.1
  num_encoder_layers: 2
  num_heads: 4
  dim_feedforward: 128
  attn_dropout: 0.1
  ff_dropout: 0.1
  activation: "gelu"
  norm_first: true
  positional_encoding: "sinusoidal"
  use_cls_token: true
  cls_max_len: 256
  head_hidden_dim: 64
  head_dropout: 0.3

training:
  device: "auto"
  batch_size: 256
  batch_mode: "date"
  max_epochs: 80
  optimizer: "adamw"
  learning_rate: 0.0003
  weight_decay: 0.001
  loss_fn: "mse_ic"
  ic_loss_alpha: 0.2
  ic_loss_eps: 0.000001
  ic_loss_min_samples: 20
  max_grad_norm: 1.0
  scheduler: "warmup_cosine"
  warmup_ratio: 0.1
  early_stop_metric: "rank_ic_mean"
  early_stop_patience: 8
  min_best_daily_ratio: 0.85
  collapse_stop_patience: 2
  collapse_stop_statuses:
    - "prediction_collapse"
  min_daily_count: 20
