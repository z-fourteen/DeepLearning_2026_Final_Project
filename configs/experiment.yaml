experiment:
  name: chinext_excess5d_modeling_v1
  data_version: v20260526
  benchmark: "399006.SZ"
  label_column: label_rel_return
  split_name: chinext_2016_2026_v1
  feature_sets:
    baseline: baseline_lightgbm_fixed
    sequence: advanced_sequence_fixed

models:
  lightgbm:
    objective: regression
    metric: l2
    learning_rate: 0.03
    num_leaves: 31
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    min_data_in_leaf: 80
    num_boost_round: 2000
    early_stopping_rounds: 100
  sequence:
    lookbacks: [20, 60]
    batch_size: 256
    max_epochs: 80
    learning_rate: 0.001
    weight_decay: 0.0001
    dropout: 0.2

backtest:
  top_k: [10, 20, 30]
  holding_days: 5
  rebalance: weekly
  execution_price: next_open
  transaction_cost_bps: [10, 20]
