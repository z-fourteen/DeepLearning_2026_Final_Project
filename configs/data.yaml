project:
  name: incremental_quant_pipeline
  timezone: Asia/Shanghai

source:
  root_dir: "A股数据"
  csv_encoding: "utf-8"

lake:
  raw_dir: "data/lake/raw"
  core_dir: "data/lake/core"
  state_dir: "data/lake/state"
  audit_dir: "data/lake/audit"

mart:
  features_dir: "data/mart/features_daily"
  labels_dir: "data/mart/labels"
  datasets_dir: "data/mart/datasets"

cache:
  rolling_features_dir: "data/cache/rolling_features"

meta:
  file_registry: "meta/file_registry.parquet"
  data_versions: "meta/data_versions.parquet"
  schema_registry: "meta/schema_registry.yaml"

logs:
  audit_dir: "logs/audit"

ingestion:
  append_only: true
  schema_validation:
    enabled: true
    strict_columns: false
    schemas:
      basic:
        columns:
          ts_code: string
          symbol: string
          name: string
          area: string
          industry: string
          cnspell: string
          market: string
          list_date: date_yyyymmdd
          act_name: string
          act_ent_type: string
      trade_cal:
        columns:
          exchange: string
          cal_date: date_yyyymmdd
          is_open: integer
          pretrade_date: date_yyyymmdd
      daily:
        columns:
          ts_code: string
          trade_date: date_yyyymmdd
          open: numeric
          high: numeric
          low: numeric
          close: numeric
          pre_close: numeric
          change: numeric
          pct_chg: numeric
          vol: numeric
          amount: numeric
          vwap: numeric
      stock_st:
        columns:
          ts_code: string
          name: string
          trade_date: date_yyyymmdd
          type: string
          type_name: string
      index_weight:
        columns:
          index_code: string
          con_code: string
          trade_date: date_yyyymmdd
          weight: numeric
  datasets:
    basic:
      path: "basic.csv"
      layout: single_file
      date_from: none
    trade_cal:
      path: "trade_cal.csv"
      layout: single_file
      date_from: column
      date_column: cal_date
    daily:
      path: "daily"
      layout: dated_files
      date_from: filename
    stock_st:
      path: "stock_st"
      layout: dated_files
      date_from: filename
    index_weight:
      path: "index_weight"
      layout: monthly_index_files
      date_from: column
      date_column: trade_date
