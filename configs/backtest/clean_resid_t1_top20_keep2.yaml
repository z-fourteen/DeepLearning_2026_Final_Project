mainline:
  name: final_mainline_t1_top10_keep1
  description: Compatibility T+1 route for the frozen L60 feature-style interaction GRU epoch-12 mainline.
  frozen_model: feature_style_interaction_gru_l60_clean_alpha_resid_style_topk10_wide30_clean
  checkpoint_epoch: 12
  selection_metric: checkpoint_score

inputs:
  predictions: outputs/runs/feature_style_interaction_gru_l60_clean_alpha_resid_style_topk10_wide30_clean/predictions.parquet
  model_config: outputs/runs/feature_style_interaction_gru_l60_clean_alpha_resid_style_topk10_wide30_clean/config.yaml
  model_metrics: outputs/runs/feature_style_interaction_gru_l60_clean_alpha_resid_style_topk10_wide30_clean/metrics.json
  dataset_manifest: data/mart/datasets/clean_purged_wf/dataset_seq_l60_adv_clean_v1_alpha_resid_style_chinext_purged_walk_forward_manifest.json
  mart: data/mart/datasets/core/dataset_v20260526.parquet
  execution_labels: data/mart/labels/execution_labels_v20260526.parquet
  clean_alpha_only_predictions: outputs/runs/gru_l20_clean_alpha_only_purgedwf_strictmask_leaky0005/predictions.parquet

execution:
  k: 10
  keep_multiplier: 1.0
  cost_bps: 10.0
  slippage_bps: 5.0
  portfolio_nav: 10000000.0
