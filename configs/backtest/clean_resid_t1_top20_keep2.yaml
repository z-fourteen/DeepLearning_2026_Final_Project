  keep_multipliers: [1.0, 1.5, 2.0, 3.0]
  cost_bps_values: [5.0, 10.0, 20.0, 30.0]
  portfolio_nav_values: [1000000.0, 5000000.0, 10000000.0, 30000000.0, 50000000.0]
  participation_cap_values: [0.01, 0.03, 0.05]

outputs:
  backtest_dir: outputs/backtest/final_mainline_t1_top10_keep1
  audit_dir: outputs/audit/final_mainline_t1_top10_keep1
