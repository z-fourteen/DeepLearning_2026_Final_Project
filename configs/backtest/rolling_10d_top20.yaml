# Rolling-window backtest: 10-day windows with stride=5, full-position requirement
# Target: ~60 windows from test set (311 trading days), metrics = average across windows

mainline:
  name: rolling_10d_fullposition_top20
  description: "Rolling window backtest: 10-day windows, stride=5, daily >=80% position, T+1 execution"

execution:
  k: [20]
  cost_bps: 12.0          # Slightly higher for frequent rebalancing
  slippage_bps: 5.0
  portfolio_nav: 10000000.0
  participation_cap: 0.03

  # Window configuration
  window_size: 10         # Each window = 10 trading days
  stride: 5               # Slide by 5 days each time (~60 windows total)

  # Full-position enforcement
  min_position_ratio: 0.80    # Red line: must maintain >=80% position
  max_carryover_days: 2       # Unfilled orders carry over max 2 days

  # Within-window rebalancing
  rebalance_fraction: 0.33    # Replace 1/3 of portfolio each rebalance
  rebalance_stride: 3         # Rebalance every 3 days within window

data:
  min_daily_count: 20     # Skip days with fewer than 20 executable stocks

inputs:
  predictions: outputs/runs/transformer_l60_clean_alpha_only_purgedwf/predictions.parquet
  execution_labels: data/mart/labels/execution_labels_v20260526.parquet

output:
  output_dir: outputs/backtest/rolling_10d_l60
