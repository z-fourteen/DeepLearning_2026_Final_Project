run:
  name: "gru_l20_mse_ic_frozen_head"
  output_dir: "outputs/runs/gru_l20_mse_ic_frozen_head"
  seed: 42

data:
  npz_path: "data/mart/datasets/dataset_sequence_l20_advanced_sequence_fixed_chinext_2016_2026_v1_v20260526.npz"
  train_split: "train"
  validation_split: "validation"
  test_split: "test"
  num_workers: 0
  pin_memory: true

model:
  name: "gru_baseline"
  num_features: 62
  lookback: 20
  d_model: 64
  input_dropout: 0.1
  rnn_hidden_dim: 128
  rnn_num_layers: 2
  rnn_dropout: 0.2
  pooling: "last_hidden"
  head_hidden_dim: 64
  head_dropout: 0.3
  head_activation: "leaky_relu"
  head_negative_slope: 0.005

training:
  device: "auto"
  batch_size: 256
  batch_mode: "date"
  max_epochs: 80
  optimizer: "adamw"
  learning_rate: 0.0003
  weight_decay: 0.00001
  loss_fn: "mse_ic"
  ic_loss_alpha: 0.2
  ic_loss_eps: 0.000001
  ic_loss_min_samples: 20
  max_grad_norm: 1.0
  scheduler: "cosine"
  early_stop_metric: "rank_ic_mean"
  early_stop_patience: 10
  min_best_daily_ratio: 0.8
  collapse_stop_patience: 2
  collapse_stop_statuses:
    - "prediction_collapse"
  min_daily_count: 20
