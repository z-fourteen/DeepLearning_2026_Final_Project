rolling_windows: [5, 10, 20, 60]
cache_dir: "data/cache/rolling_features"
future_shift_allowed: false
feature_availability: "lag1_close_to_next_session"
baseline_feature_prefix: "lag1_"
feature_sets:
  advanced_sequence_clean_v1:
    source: "feature_engineering_20260529_alpha_pruned"
    include_prefixes: ["lag1_"]
    sequence_windows: [20, 60]
    role_config: "configs/features/advanced_sequence_clean_v1.yaml"
    selected_features:
      - lag1_net_mf_strength_20d_mean
      - lag1_net_mf_strength_60d_mean
      - lag1_close_position
      - lag1_excess_ret_10d_mean
      - lag1_excess_ret_1d
      - lag1_excess_ret_5d_mean
      - lag1_industry_neutral_ret_1d
      - lag1_ret_1d
      - lag1_ret_20d
      - lag1_ret_5d_mean
      - lag1_bollinger_z_20d
      - lag1_ma_ratio_20_60
      - lag1_macd_hist
  dropped_after_validation:
    - lag1_is_limit_down
    - lag1_is_limit_up
    - lag1_limit_ratio
    - lag1_has_price_limit
    - lag1_is_month_end
validation:
  strict_no_future_shift_in_features: true
  dataset_requires_lagged_features_only: true
  max_baseline_corr: 0.85
  regime_ic_enabled: true
  regime_definition: "historical_benchmark_ret20_vol20_amount60"
  supported_reports:
    - factor_daily_ic
    - factor_ic_rankic
    - factor_quantile_long_short
    - factor_quantile_detail
    - factor_yearly_quantile_long_short
    - factor_regime_quantile_long_short
    - factor_regime_ic
    - factor_neutralized_ic
    - factor_holdout_quantile_long_short
    - feature_quality
    - feature_correlation_top
    - feature_recommendations
    - validation_profile
  supported_stages:
    - ic
    - quality
    - correlation
    - regime-ic
    - quantile
    - extended-quantile
    - neutralized
    - recommendation
  output_layout: "outputs/factor_validation/{feature_set}/{validation_mode}/"
  recommendation_source: "outputs/factor_validation/all_lag1/label_rel_return_q5_cs30_corr0p85_train_all_eval_all_quantile_on_ext_on_neutral_on/feature_recommendations.csv"
  collinearity_pruning_groups:
    - [lag1_ret_5d, lag1_ret_5d_mean]
    - [lag1_ret_20d, lag1_ret_20d_mean]
    - [lag1_large_order_imbalance, lag1_main_mf_strength]
    - [lag1_price_to_ma20, lag1_bollinger_z_20d]
    - [lag1_macd_diff, lag1_macd_dea, lag1_macd_hist]
    - [lag1_dist_to_limit_up, lag1_dist_to_limit_down, lag1_ret_1d]
  train_only_recommendation:
    enabled: true
    train_end_date: "20251231"
    eval_start_date: "20260101"
  neutralization:
    enabled: true
    industry:
      enabled: true
      column: industry
    style_exposures:
      - name: size
        candidates:
          - lag1_log_circ_mv
          - lag1_log_total_mv
          - lag1_industry_mv_rank
      - name: liquidity
        candidates:
          - lag1_turnover_rate_f
          - lag1_turnover_rate
          - lag1_turnover_20d_mean
          - lag1_turnover_60d_mean
          - lag1_amount_log
          - lag1_amount_rank_pct
      - name: volatility
        candidates:
          - lag1_ret_20d_std
          - lag1_ret_60d_std
          - lag1_amplitude
          - lag1_volume_ratio
      - name: momentum
        candidates:
          - lag1_ret_20d_mean
          - lag1_ret_60d_mean
          - lag1_ret_20d
          - lag1_ret_5d_mean
          - lag1_ret_5d
